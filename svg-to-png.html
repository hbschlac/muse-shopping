<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>SVG to PNG Converter</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: #000;
      overflow: hidden;
    }
    #container {
      width: 1242px;
      height: 2208px;
      margin: 0;
      padding: 0;
    }
  </style>
</head>
<body>
  <div id="container"></div>

  <script>
    // Get tile number from URL parameter
    const params = new URLSearchParams(window.location.search);
    const tile = params.get('tile') || '1';

    const tiles = {
      '1': {
        file: '01-all-your-favorites-one-cart.svg',
        gradient: { start: '#1a1a2e', mid: '#16213e', end: '#0f1419' },
        headline: 'All your\nfavorites.',
        subtext: 'One cart.'
      },
      '2': {
        file: '02-we-show-you-where-to-buy.svg',
        gradient: { start: '#0f1419', mid: '#1a1a2e', end: '#16213e' },
        headline: 'We show you',
        subtext: 'where to buy.'
      },
      '3': {
        file: '03-shop-with-ease.svg',
        gradient: { start: '#16213e', mid: '#0f1419', end: '#1a1a2e' },
        headline: 'Shop with',
        subtext: 'ease.'
      }
    };

    const currentTile = tiles[tile];

    // Create SVG directly
    const svg = `
      <svg width="1242" height="2208" viewBox="0 0 1242 2208" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:${currentTile.gradient.start};stop-opacity:1" />
            <stop offset="45%" style="stop-color:${currentTile.gradient.mid};stop-opacity:1" />
            <stop offset="100%" style="stop-color:${currentTile.gradient.end};stop-opacity:1" />
          </linearGradient>
        </defs>

        <rect width="1242" height="2208" fill="url(#bg)"/>

        <text x="80" y="180" font-family="Helvetica, -apple-system, sans-serif" font-size="104" font-weight="700" fill="#ffffff">
          ${currentTile.headline.split('\n').map((line, i) =>
            `<tspan x="80" dy="${i > 0 ? '110' : '0'}">${line}</tspan>`
          ).join('\n          ')}
        </text>

        <text x="80" y="${currentTile.headline.includes('\n') ? '430' : '320'}" font-family="Helvetica, -apple-system, sans-serif" font-size="72" font-weight="300" font-style="italic" fill="#ffffff" fill-opacity="0.95">
          ${currentTile.subtext}
        </text>

        <g transform="translate(411, 600) rotate(-6)">
          <rect x="0" y="0" width="420" height="860" rx="55" fill="#1c1c1e"
                filter="drop-shadow(0 60px 120px rgba(0,0,0,0.6))"/>
          <rect x="12" y="12" width="396" height="836" rx="46" fill="#f5f5f5"/>
          <rect x="148" y="24" width="125" height="37" rx="19" fill="#000000"/>
          <rect x="12" y="70" width="396" height="780" fill="#FAFAF8"/>
          <text x="210" y="480" font-family="system-ui" font-size="24" fill="#999999" text-anchor="middle">
            [Insert Screenshot]
          </text>
        </g>
      </svg>
    `;

    document.getElementById('container').innerHTML = svg;

    // Auto-capture message
    console.log('Ready for screenshot capture');
    document.title = `Tile ${tile} - ${currentTile.file}`;
  </script>
</body>
</html>
